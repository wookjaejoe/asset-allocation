name: schedule-probe

on:
  workflow_dispatch:
  schedule:
    # 스케줄 트리거 동작 확인용: 5분마다(UTC) 실행
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Log timestamp
        run: |
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
